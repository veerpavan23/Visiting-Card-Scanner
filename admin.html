<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Liquid Premium Scanner</title>
    
    <script>
        // Synchronous Auth Gatekeeper
        if (!localStorage.getItem('admin_bizconnex_session')) {
            window.location.href = 'admin-login.html';
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="styles.css?v=14.15">
    <style>
        :root {
            --admin-accent: #3498db;
        }
        body { background: #050a14; overflow-x: hidden; color: #fff; }
        .admin-sidebar {
            width: 260px;
            height: 100vh;
            background: rgba(10, 25, 47, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            position: fixed;
            left: 0;
            top: 0;
            padding: 30px;
            z-index: 100;
        }
        .admin-main {
            margin-left: 260px;
            padding: 40px;
            min-height: 100vh;
        }
        .sidebar-nav { display: flex; flex-direction: column; gap: 10px; }
        .nav-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            padding: 12px 18px;
            border-radius: 12px;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            width: 100%;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-btn.active { 
            background: rgba(52, 152, 219, 0.1); 
            border-color: rgba(52, 152, 219, 0.3); 
            color: var(--admin-accent); 
        }
        .nav-btn i { width: 20px; }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .event-card {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .event-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }
        .modal-card {
            background: #0a192f;
            width: 550px;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            max-height: 90vh;
            overflow-y: auto;
        }
        .chart-container {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <aside class="admin-sidebar">
        <h2 style="font-family: 'Outfit'; font-size: 20px; margin-bottom: 40px;">
            <i data-lucide="shield-check" class="text-accent" style="vertical-align: middle; margin-right: 8px;"></i>
            Liquid<span class="text-accent">Admin</span>
        </h2>
        <nav class="sidebar-nav">
            <button id="nav-dashboard" class="nav-btn active" onclick="Admin.navigateTo('dashboard')">
                <i data-lucide="layout-dashboard"></i> Dashboard
            </button>
            <button id="nav-events" class="nav-btn" onclick="Admin.navigateTo('events')">
                <i data-lucide="calendar"></i> Events
            </button>
            <button id="nav-leads" class="nav-btn" onclick="Admin.navigateTo('leads')">
                <i data-lucide="database"></i> Leads Management
            </button>
            <button id="nav-users" class="nav-btn" onclick="Admin.navigateTo('users')">
                <i data-lucide="users"></i> User Access
            </button>
            <button id="nav-analytics" class="nav-btn" onclick="Admin.navigateTo('analytics')">
                <i data-lucide="line-chart"></i> Analytics
            </button>
            
            <button class="nav-btn" style="margin-top: 40px; color: #ff4d4d;" onclick="Admin.logout()">
                <i data-lucide="log-out"></i> Logout
            </button>
        </nav>
    </aside>

    <main class="admin-main" id="admin-content-root">
        <!-- Content dynamically injected here -->
        <div style="height: 100%; display: flex; align-items: center; justify-content: center; opacity: 0.5;">
            <p>Initializing Control Panel...</p>
        </div>
    </main>

    <!-- Global Modals (Shared across tabs) -->
    <div id="create-modal" class="modal-overlay">
        <div class="modal-card" id="modal-content">
            <!-- Modal content injected here -->
        </div>
    </div>

    <!-- Notification Container -->
    <div id="notif-container" style="position: fixed; top: 20px; right: 20px; z-index: 10000; display: flex; flex-direction: column; align-items: flex-end;"></div>

    <script type="module" src="firebase-config.js?v=14.15"></script>
    <script src="admin.js?v=14.15"></script>
    <script>
        window.addEventListener('load', () => {
            if (window.Admin) Admin.init();
        });
    </script>
</body>
</html>
