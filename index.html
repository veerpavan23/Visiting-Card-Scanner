<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bizconnex | Enterprise Card Scanner</title>
    
    <!-- PWA / Mobile Web App Meta -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <link rel="stylesheet" href="styles.css?v=16.10">
 </head>
 <body>
      <div id="app" class="app-container">
          <header id="global-header" class="header hidden">
              <div id="header-left" class="header-side"></div>
              <div id="header-brand" class="header-brand">Biz<span class="text-accent">connex</span></div>
              <div class="header-side" style="justify-content: flex-end;">
                  <button class="header-btn" onclick="App.showNotifications()">
                      <i data-lucide="bell"></i>
                      <div id="notif-badge" class="badge hidden"></div>
                  </button>
              </div>
          </header>

          <main id="screen-container">
              <!-- Screens rendered here -->
          </main>

          <nav id="global-nav" class="nav-bar hidden">
              <div class="nav-item" data-screen="home">
                  <i data-lucide="home"></i>
                  <span>Home</span>
              </div>
              <div class="nav-item" data-screen="contacts">
                  <i data-lucide="users"></i>
                  <span>Leads</span>
              </div>
              <div class="nav-fab" onclick="App.navigateTo('capture')">
                  <div class="fab-circle">
                      <i data-lucide="camera"></i>
                  </div>
              </div>
              <div class="nav-item" data-screen="eventSelect">
                  <i data-lucide="calendar"></i>
                  <span>Shows</span>
              </div>
              <div class="nav-item" data-screen="export">
                  <i data-lucide="download"></i>
                  <span>Export</span>
              </div>
          </nav>
      </div>

     <!-- Scripts -->
     <!-- Firebase Cloud Bridge (module - runs async) -->
      <script type="module" src="firebase-config.js?v=16.10"></script>
     <!-- App Logic -->
      <script src="app.js?v=16.10"></script>
     <script>
          // --- THE KILL-SWITCH: Force Cache Clear & Disable SW ---
          if ('serviceWorker' in navigator) {
               navigator.serviceWorker.getRegistrations().then(regs => {
                   for(let r of regs) { r.unregister(); }
               });
          }
          if ('caches' in window) {
               caches.keys().then(ns => {
                   for (let n of ns) caches.delete(n);
               });
          }
          console.log('App: v16.00 Sync Rescue Protocol Active');

          // --- protocol Warning ---
          if (window.location.protocol === 'file:') {
              const b = document.createElement('div');
              b.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; background: #ff4d4d; color: #fff; padding: 15px; text-align: center; z-index: 100000; font-weight: 800; font-family: sans-serif;';
              b.innerHTML = '⚠️ ERROR: TESTING ON "FILE://" PROTOCOL IS BLOCKED. <br> <small>Please use <u>http://localhost:8000/index.html</u> instead.</small>';
              document.body.prepend(b);
          }
     </script>
 </body>
 </html>
